<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Álbum Panini 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<style>
  :root{
    --bg:#f4f6f4; --card:#ffffff; --text:#15211a; --muted:#5c6b62;
    --border:#d8ded9; --accent:#1f7a3d; --accent-soft:#e3f0e7;
    --ok:#1f7a3d; --ok-bg:#e3f0e7; --miss:#b3261e; --miss-bg:#fbe9e7;
    --rep:#0b5cad; --rep-bg:#e2eefb; --chip:#eceeec;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#121714; --card:#1c231e; --text:#e8ede9; --muted:#9aa79f;
      --border:#2e372f; --accent:#4cba74; --accent-soft:#1e3327;
      --ok:#4cba74; --ok-bg:#1e3327; --miss:#ff7b6e; --miss-bg:#3a221f;
      --rep:#6db3f2; --rep-bg:#1c2c3d; --chip:#252d27;
    }
  }
  *{box-sizing:border-box; min-width:0}
  html,body{margin:0; overflow-x:hidden; max-width:100%}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:16px; line-height:1.4;
    -webkit-tap-highlight-color:transparent;
  }
  .wrap{max-width:520px; margin:0 auto; padding:12px 12px 90px}
  header{display:flex; align-items:baseline; justify-content:space-between; gap:8px; padding:4px 2px 10px; flex-wrap:wrap}
  header h1{font-size:1rem; margin:0; letter-spacing:.02em; white-space:nowrap}
  header h1 span{color:var(--accent)}
  .stats{font-size:.75rem; color:var(--muted); font-variant-numeric:tabular-nums; text-align:right; flex:1; white-space:nowrap}
  .stats b{color:var(--text)}

  .tabs{
    position:fixed; bottom:0; left:0; right:0; z-index:10;
    display:flex; background:var(--card); border-top:1px solid var(--border);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .tabs button{
    flex:1; padding:12px 2px 10px; border:0; background:none; color:var(--muted);
    font-size:.78rem; font-weight:600; letter-spacing:.03em; cursor:pointer;
  }
  .tabs button .n{display:block; font-size:1.15rem; line-height:1.1; font-variant-numeric:tabular-nums}
  .tabs button.on{color:var(--accent)}

  section{display:none}
  section.on{display:block}

  input[type=text], select, textarea{
    width:100%; padding:12px 14px; font-size:1.05rem; color:var(--text);
    background:var(--card); border:1.5px solid var(--border); border-radius:10px;
    outline:none;
  }
  input[type=text]:focus{border-color:var(--accent)}
  #q{font-size:1.35rem; text-transform:uppercase; font-weight:700; letter-spacing:.06em; text-align:center}

  .sugs{margin-top:8px; background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden}
  .sug{
    display:flex; align-items:center; gap:10px; width:100%; text-align:left;
    padding:13px 14px; border:0; border-bottom:1px solid var(--border);
    background:none; color:var(--text); font-size:1rem; cursor:pointer;
  }
  .sug:last-child{border-bottom:0}
  .sug .sc{font-weight:800; letter-spacing:.05em; min-width:52px; color:var(--accent)}
  .sug .sn{flex:1}
  .sug .sn small{color:var(--muted); display:block; font-size:.75rem}

  .card{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; margin-top:12px}
  .status{border-radius:12px; padding:16px 14px; margin-top:12px; text-align:center}
  .status .code{font-size:2rem; font-weight:800; letter-spacing:.05em; font-variant-numeric:tabular-nums}
  .status .team{font-size:1rem; margin-top:2px}
  .status .verdict{font-size:1.5rem; font-weight:800; margin-top:8px; letter-spacing:.02em}
  .status .page{margin-top:6px; font-size:.85rem; opacity:.85}
  .status.miss{background:var(--miss-bg); color:var(--miss)}
  .status.ok{background:var(--ok-bg); color:var(--ok)}
  .status.rep{background:var(--rep-bg); color:var(--rep)}

  .actions{display:flex; gap:10px; margin-top:12px}
  .actions button{
    flex:1; padding:16px 8px; font-size:1rem; font-weight:700; border-radius:12px;
    border:1.5px solid var(--border); background:var(--card); color:var(--text); cursor:pointer;
  }
  .actions button.primary{background:var(--accent); border-color:var(--accent); color:#fff}
  .actions button.rep-btn{background:var(--rep); border-color:var(--rep); color:#fff}
  .actions button:disabled{opacity:.4}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(56px,1fr)); gap:8px; margin-top:10px}
  .grid button{
    padding:10px 2px; border-radius:9px; border:1.5px solid var(--border);
    background:var(--chip); color:var(--muted); font-weight:700; font-size:.95rem;
    font-variant-numeric:tabular-nums; cursor:pointer; position:relative;
  }
  .grid button.ok{background:var(--ok-bg); border-color:var(--ok); color:var(--ok)}
  .grid button.rep{background:var(--rep-bg); border-color:var(--rep); color:var(--rep)}
  .grid button.sel{outline:3px solid var(--accent)}
  .grid button .b{
    position:absolute; top:-7px; right:-5px; background:var(--rep); color:#fff;
    border-radius:9px; font-size:.68rem; padding:1px 5px; font-weight:800;
  }

  /* Vista "página de álbum" */
  .album{background:linear-gradient(150deg,#17934e,#0d7247 55%,#0b5e50); border-radius:14px; padding:14px 12px; margin-top:12px; color:#fff}
  .album .topline{display:flex; justify-content:space-between; gap:8px; align-items:flex-start}
  .album .we-pre{font-size:.78rem; font-weight:800; font-style:italic; letter-spacing:.2em; opacity:.9}
  .album .we{font-size:1.45rem; font-weight:900; font-style:italic; letter-spacing:.02em; line-height:1.15; text-wrap:balance}
  .album .meta{display:flex; flex-direction:column; align-items:flex-end; gap:3px; font-size:.78rem; opacity:.95; font-variant-numeric:tabular-nums; white-space:nowrap}
  .album .meta span{cursor:pointer}
  .slots{display:grid; grid-template-columns:repeat(4,1fr); gap:9px; margin-top:14px}
  .slot{position:relative; border:0; border-radius:9px; padding:12px 2px 10px; display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; font-family:inherit}
  .slot .sc{font-size:.62rem; font-weight:800; letter-spacing:.08em}
  .slot .sn{font-size:1.5rem; font-weight:900; line-height:1; font-variant-numeric:tabular-nums}
  .slot.smiss{background:#f4efe3; color:#a89f8d}
  .slot.sok{background:linear-gradient(160deg,#0e4d2c,#186b3c); color:#fff; box-shadow:inset 0 0 0 2px rgba(255,255,255,.28)}
  .slot.srep{background:linear-gradient(160deg,#3b2a6e,#6242a8); color:#fff}
  .slot.sel{outline:3px solid #ffd757}
  .slot .b{position:absolute; top:-7px; right:-6px; background:#ffd757; color:#4a3a10; border-radius:9px; font-size:.68rem; padding:1px 5px; font-weight:800}
  .slot .tick{position:absolute; top:4px; right:6px; font-size:.7rem; opacity:.9}
  .groupbar{margin-top:14px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:rgba(0,0,0,.18); border-radius:10px; padding:9px 10px}
  .groupbar .gt{font-weight:900; font-style:italic; letter-spacing:.08em; font-size:.95rem}
  .gchip{border:0; border-radius:8px; padding:6px 9px; font-weight:800; font-size:.85rem; background:rgba(255,255,255,.92); color:#0d5c3a; cursor:pointer}
  .gchip.cur{background:#ffd757; color:#4a3a10}

  /* Doble página estilo álbum */
  .spread{display:flex; flex-direction:column; gap:10px; margin-top:10px}
  .page{background:linear-gradient(150deg,#17934e,#0d7247 60%,#0b5e50); border-radius:12px; padding:10px; color:#fff}
  .pgrid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; grid-auto-rows:minmax(74px,auto)}
  .tblock{grid-column:span 2; display:flex; flex-direction:column; justify-content:center; padding:2px 4px}
  .tblock .we-pre{font-size:.7rem}
  .tblock .we{font-size:1.05rem; line-height:1.15}
  .pgn{text-align:right; font-size:.68rem; opacity:.75; margin-top:6px; font-style:italic}
  .slot.wide{grid-column:span 2}
  .slot.shiny.smiss{background:linear-gradient(160deg,#ead9f7,#cbaae9); color:#7a4ba8}
  .gblock{background:rgba(0,0,0,.28); border-radius:9px; padding:6px 4px; display:flex; flex-direction:column; gap:5px; align-items:center; justify-content:center}
  .gblock .gt{font-weight:900; font-style:italic; font-size:.72rem; letter-spacing:.06em}
  .gblock .gflags{display:grid; grid-template-columns:1fr 1fr; gap:3px}
  .gblock .gchip{padding:3px 5px; font-size:.62rem; border-radius:6px}
  .metabar{display:flex; justify-content:flex-end; gap:14px; margin-top:8px; font-size:.78rem; color:var(--muted); font-variant-numeric:tabular-nums}
  .metabar span{cursor:pointer}

  .row{
    display:flex; align-items:center; gap:10px; padding:10px 4px;
    border-bottom:1px solid var(--border);
  }
  .row:last-child{border-bottom:0}
  .row .code{font-weight:800; font-variant-numeric:tabular-nums; min-width:74px; letter-spacing:.04em}
  .row .info{flex:1; min-width:0}
  .row .info .t{font-size:.9rem}
  .row .cnt{font-weight:800; color:var(--rep); font-variant-numeric:tabular-nums}
  .row button{
    width:46px; height:46px; border-radius:10px; border:1.5px solid var(--rep);
    background:var(--rep-bg); color:var(--rep); font-size:1.4rem; font-weight:800; cursor:pointer;
  }

  .team-row{display:flex; align-items:center; gap:10px; padding:11px 4px; border-bottom:1px solid var(--border); cursor:pointer}
  .team-row:last-child{border-bottom:0}
  .team-row .nm{flex:1; font-weight:600}
  .team-row .nm small{color:var(--muted); font-weight:400}
  .team-row .pr{font-size:.85rem; color:var(--muted); font-variant-numeric:tabular-nums; text-align:right}
  .team-row .pr b{color:var(--text)}
  .bar{height:5px; background:var(--chip); border-radius:3px; overflow:hidden; margin-top:4px; width:90px}
  .bar i{display:block; height:100%; background:var(--accent)}

  h2{font-size:.8rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:18px 2px 6px}
  .hint{font-size:.8rem; color:var(--muted); margin-top:8px; text-align:center}
  .btn-line{display:flex; gap:8px; margin-top:10px}
  .btn-line button{
    flex:1; padding:11px 6px; border-radius:10px; border:1.5px solid var(--border);
    background:var(--card); color:var(--text); font-weight:600; font-size:.9rem; cursor:pointer;
  }
  .empty{text-align:center; color:var(--muted); padding:26px 10px; font-size:.95rem}
  .toast{
    position:fixed; bottom:78px; left:50%; transform:translateX(-50%);
    background:var(--text); color:var(--bg); padding:9px 18px; border-radius:20px;
    font-size:.9rem; font-weight:600; opacity:0; transition:opacity .25s; pointer-events:none; z-index:20;
  }
  .toast.show{opacity:1}
  button:focus-visible, input:focus-visible, select:focus-visible{outline:3px solid var(--accent); outline-offset:1px}
  @media (prefers-reduced-motion: reduce){ .toast{transition:none} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>⚽ <span>Mundial 2026</span></h1>
    <div class="stats" id="stats"></div>
  </header>

  <!-- BUSCAR -->
  <section id="sec-buscar" class="on">
    <input type="text" id="q" placeholder="ARG10 · FWC5 · bosnia…" autocomplete="off" autocapitalize="characters" inputmode="text">
    <div class="sugs" id="sugs" style="display:none"></div>
    <div id="result"></div>
    <div id="teamview"></div>
    <p class="hint" id="searchHint">Escribí un código (ARG10, FWC5) o un equipo<br>por sigla o nombre en español o inglés (BIH / Bosnia).</p>
  </section>

  <!-- REPES -->
  <section id="sec-repes">
    <div class="card" style="padding:6px 10px" id="repList"></div>
    <p class="hint">Tocá <b>−</b> cuando entregás una repetida en un cambio.</p>
  </section>

  <!-- FALTAN -->
  <section id="sec-faltan">
    <select id="faltanTeam"></select>
    <div id="faltanList"></div>
  </section>

  <!-- EQUIPOS -->
  <section id="sec-equipos">
    <div class="card" style="padding:6px 10px" id="teamList"></div>
    <div class="btn-line">
      <button id="addTeam">＋ Agregar equipo</button>
    </div>
    <h2>Copia de seguridad</h2>
    <div class="card">
      <textarea id="io" rows="3" placeholder="Acá aparece tu backup, o pegá uno para importar" style="font-size:.8rem; font-family:monospace"></textarea>
      <div class="btn-line">
        <button id="expBtn">Copiar backup</button>
        <button id="dlBtn">Descargar</button>
        <button id="impBtn">Importar</button>
      </div>
      <p class="hint" id="storageNote"></p>
    </div>
  </section>
</div>

<nav class="tabs">
  <button data-t="buscar" class="on"><span class="n">🔍</span>Buscar</button>
  <button data-t="repes"><span class="n" id="tabRepes">0</span>Repes</button>
  <button data-t="faltan"><span class="n" id="tabFaltan">0</span>Faltan</button>
  <button data-t="equipos"><span class="n">🏳️</span>Equipos</button>
</nav>
<div class="toast" id="toast"></div>

<script>
'use strict';
// ── Datos base ─────────────────────────────────────────────
// Checklist real del álbum (foto del índice): 48 equipos en grupos A–L,
// p = página donde arranca cada equipo en el álbum.
const NATIONS = [
  {c:'MEX',es:'México',en:'Mexico',g:'A',p:8},
  {c:'RSA',es:'Sudáfrica',en:'South Africa',g:'A',p:10,a:['SUD']},
  {c:'KOR',es:'Corea del Sur',en:'Korea Republic',g:'A',p:12,a:['COR']},
  {c:'CZE',es:'Chequia',en:'Czechia',g:'A',p:14,a:['CHE']},
  {c:'CAN',es:'Canadá',en:'Canada',g:'B',p:16},
  {c:'BIH',es:'Bosnia y Herzegovina',en:'Bosnia-Herzegovina',g:'B',p:18,a:['BOS']},
  {c:'QAT',es:'Catar',en:'Qatar',g:'B',p:20},
  {c:'SUI',es:'Suiza',en:'Switzerland',g:'B',p:22},
  {c:'BRA',es:'Brasil',en:'Brazil',g:'C',p:24},
  {c:'MAR',es:'Marruecos',en:'Morocco',g:'C',p:26},
  {c:'HAI',es:'Haití',en:'Haiti',g:'C',p:28},
  {c:'SCO',es:'Escocia',en:'Scotland',g:'C',p:30,a:['ESC']},
  {c:'USA',es:'Estados Unidos',en:'USA',g:'D',p:32,a:['EEUU']},
  {c:'PAR',es:'Paraguay',en:'Paraguay',g:'D',p:34},
  {c:'AUS',es:'Australia',en:'Australia',g:'D',p:36},
  {c:'TUR',es:'Turquía',en:'Türkiye',g:'D',p:38},
  {c:'GER',es:'Alemania',en:'Germany',g:'E',p:40,a:['ALE']},
  {c:'CUW',es:'Curazao',en:'Curaçao',g:'E',p:42,a:['CUR']},
  {c:'CIV',es:'Costa de Marfil',en:'Côte d\'Ivoire',g:'E',p:44},
  {c:'ECU',es:'Ecuador',en:'Ecuador',g:'E',p:46},
  {c:'NED',es:'Países Bajos',en:'Netherlands',g:'F',p:48,a:['HOL','HOLANDA']},
  {c:'JPN',es:'Japón',en:'Japan',g:'F',p:50,a:['JAP']},
  {c:'SWE',es:'Suecia',en:'Sweden',g:'F',p:52},
  {c:'TUN',es:'Túnez',en:'Tunisia',g:'F',p:54},
  {c:'BEL',es:'Bélgica',en:'Belgium',g:'G',p:58},
  {c:'EGY',es:'Egipto',en:'Egypt',g:'G',p:60,a:['EGI']},
  {c:'IRN',es:'Irán',en:'IR Iran',g:'G',p:62},
  {c:'NZL',es:'Nueva Zelanda',en:'New Zealand',g:'G',p:64},
  {c:'ESP',es:'España',en:'Spain',g:'H',p:66},
  {c:'CPV',es:'Cabo Verde',en:'Cabo Verde',g:'H',p:68},
  {c:'KSA',es:'Arabia Saudita',en:'Saudi Arabia',g:'H',p:70,a:['ARA']},
  {c:'URU',es:'Uruguay',en:'Uruguay',g:'H',p:72},
  {c:'FRA',es:'Francia',en:'France',g:'I',p:74},
  {c:'SEN',es:'Senegal',en:'Senegal',g:'I',p:76},
  {c:'IRQ',es:'Irak',en:'Iraq',g:'I',p:78},
  {c:'NOR',es:'Noruega',en:'Norway',g:'I',p:80},
  {c:'ARG',es:'Argentina',en:'Argentina',g:'J',p:82},
  {c:'ALG',es:'Argelia',en:'Algeria',g:'J',p:84},
  {c:'AUT',es:'Austria',en:'Austria',g:'J',p:86},
  {c:'JOR',es:'Jordania',en:'Jordan',g:'J',p:88},
  {c:'POR',es:'Portugal',en:'Portugal',g:'K',p:90},
  {c:'COD',es:'RD del Congo',en:'Congo DR',g:'K',p:92,a:['CONGO']},
  {c:'UZB',es:'Uzbekistán',en:'Uzbekistan',g:'K',p:94},
  {c:'COL',es:'Colombia',en:'Colombia',g:'K',p:96},
  {c:'ENG',es:'Inglaterra',en:'England',g:'L',p:98,a:['ING']},
  {c:'CRO',es:'Croacia',en:'Croatia',g:'L',p:100},
  {c:'GHA',es:'Ghana',en:'Ghana',g:'L',p:102},
  {c:'PAN',es:'Panamá',en:'Panama',g:'L',p:104},
];
// Secciones especiales: FWC 1–19 (páginas de inicio) y CC 1–14
const SPECIALS = [
  {c:'FWC',es:'Especiales FWC',en:'FIFA World Cup',max:19,z:false,special:true,p:2},
  {c:'CC', es:'Especiales CC', en:'CC',            max:14,z:false,special:true},
];
const DEF_MAX = 20;      // los equipos van 1..20 (editable con ✎ si difiere)
const FLAGS = {
  MEX:'🇲🇽',RSA:'🇿🇦',KOR:'🇰🇷',CZE:'🇨🇿',CAN:'🇨🇦',BIH:'🇧🇦',QAT:'🇶🇦',SUI:'🇨🇭',
  BRA:'🇧🇷',MAR:'🇲🇦',HAI:'🇭🇹',SCO:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',USA:'🇺🇸',PAR:'🇵🇾',AUS:'🇦🇺',TUR:'🇹🇷',
  GER:'🇩🇪',CUW:'🇨🇼',CIV:'🇨🇮',ECU:'🇪🇨',NED:'🇳🇱',JPN:'🇯🇵',SWE:'🇸🇪',TUN:'🇹🇳',
  BEL:'🇧🇪',EGY:'🇪🇬',IRN:'🇮🇷',NZL:'🇳🇿',ESP:'🇪🇸',CPV:'🇨🇻',KSA:'🇸🇦',URU:'🇺🇾',
  FRA:'🇫🇷',SEN:'🇸🇳',IRQ:'🇮🇶',NOR:'🇳🇴',ARG:'🇦🇷',ALG:'🇩🇿',AUT:'🇦🇹',JOR:'🇯🇴',
  POR:'🇵🇹',COD:'🇨🇩',UZB:'🇺🇿',COL:'🇨🇴',ENG:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',CRO:'🇭🇷',GHA:'🇬🇭',PAN:'🇵🇦',
  FWC:'🏆',CC:'🏆'
};
const LS_KEY = 'panini2026';

// ── Estado ─────────────────────────────────────────────────
let db = {counts:{}, custom:[], pages:{}, sizes:{}};
let storageOk = true;
try{
  const raw = localStorage.getItem(LS_KEY);
  if(raw) db = Object.assign(db, JSON.parse(raw));
  if(!db.sizes) db.sizes = {};
  localStorage.setItem('__t','1'); localStorage.removeItem('__t');
}catch(e){ storageOk = false; }

function save(){
  if(!storageOk) return;
  try{ localStorage.setItem(LS_KEY, JSON.stringify(db)); }catch(e){}
}
function teams(){
  const custom = (db.custom||[]).map(x => Array.isArray(x) ? {c:x[0],es:x[1],en:x[1]} : x);
  return NATIONS.concat(custom).concat(SPECIALS);
}
function team(code){ return teams().find(t=>t.c===code) || null; }
function teamIdx(code){ return teams().findIndex(t=>t.c===code); }
function maxOf(t){ return db.sizes[t.c] || t.max || DEF_MAX; }
function hasZero(t){ return t.z === true; }
function nums(t){
  const out = hasZero(t) ? [0] : [];
  for(let n=1; n<=maxOf(t); n++) out.push(n);
  return out;
}
function codeOf(c, n){ return c + (n===0 ? '00' : n); }
function pageOf(code){
  if(db.pages && db.pages[code]) return db.pages[code];
  const t = team(code); return (t && t.p) ? t.p : null;
}
function cnt(code){ return db.counts[code] || 0; }
function setCnt(code, v){
  v = Math.max(0, v);
  if(v) db.counts[code] = v; else delete db.counts[code];
  save(); renderAll();
}
function allCodes(){
  const out = [];
  for(const t of teams()) for(const n of nums(t)) out.push(codeOf(t.c, n));
  return out;
}
function norm(s){ return s.toUpperCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }

// ── Estado UI ──────────────────────────────────────────────
let selCode = null, selTeam = null;

// ── Render ─────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function totals(){
  let have=0, reps=0, total=0;
  for(const t of teams()) total += nums(t).length;
  for(const c of allCodes()){
    const v = cnt(c);
    if(v>0){ have++; reps += v-1; }
  }
  return {have, reps, miss: total-have, total};
}

function renderStats(){
  const t = totals();
  $('stats').innerHTML = 'Pegadas <b>'+t.have+'</b>/'+t.total+' · Faltan <b>'+t.miss+'</b> · Repes <b>'+t.reps+'</b>';
  $('tabRepes').textContent = t.reps;
  $('tabFaltan').textContent = t.miss;
}

function statusHtml(code, tc){
  const v = cnt(code), t = team(tc), pg = pageOf(tc);
  let cls, verdict;
  if(v===0){ cls='miss'; verdict='❌ ME FALTA'; }
  else if(v===1){ cls='ok'; verdict='✅ LA TENGO'; }
  else { cls='rep'; verdict='🔁 REPETIDA ×'+(v-1); }
  return '<div class="status '+cls+'">'
    + '<div class="code">'+code+'</div>'
    + '<div class="team">'+(FLAGS[tc]?FLAGS[tc]+' ':'')+(t?t.es:tc)+(t&&t.g?' · Grupo '+t.g:'')+'</div>'
    + '<div class="verdict">'+verdict+'</div>'
    + (pg ? '<div class="page">Pegar en pág. '+pg+'–'+(pg+1)+'</div>' : '')
    + '</div>'
    + '<div class="actions">'
    + '<button class="primary" onclick="plus()">＋1 Conseguí</button>'
    + '<button '+(v>1?'class="rep-btn"':'')+' onclick="minus()" '+(v===0?'disabled':'')+'>'
    + (v>1 ? '−1 Cambié una' : '−1 Quitar') + '</button>'
    + '</div>';
}

function renderResult(){
  $('result').innerHTML = selCode ? statusHtml(selCode, selTeam) : '';
  $('searchHint').style.display = (selCode || selTeam) ? 'none' : '';
}

function slotBtn(t, n, extra){
  const code = codeOf(t.c, n), v = cnt(code);
  const cls = 'slot '+(v>1?'srep':(v===1?'sok':'smiss'))+(code===selCode?' sel':'')+(extra?' '+extra:'');
  return '<button class="'+cls+'" onclick="pick(\''+code+'\')">'
    + '<span class="sc">'+t.c+'</span><span class="sn">'+(n===0?'00':n)+'</span>'
    + (v>1 ? '<span class="b">+'+(v-1)+'</span>' : (v===1 ? '<span class="tick">✓</span>' : ''))
    + '</button>';
}
function renderTeamView(){
  const el = $('teamview');
  const t = selTeam ? team(selTeam) : null;
  if(!t){ el.innerHTML=''; return; }
  const pg = pageOf(t.c), list = nums(t), flag = FLAGS[t.c] || '';
  let done=0;
  for(const n of list) if(cnt(codeOf(t.c,n))>0) done++;
  const metabar = '<div class="metabar">'
    + '<span onclick="editPage(\''+t.c+'\')">Pág. '+(pg||'?')+' ✎</span>'
    + '<span onclick="editMax(\''+t.c+'\')">1–'+maxOf(t)+' ✎</span>'
    + '<span>'+done+'/'+list.length+'</span></div>';

  // Distribución real del álbum (doble página) para selecciones con 1–20
  if(t.g && maxOf(t)===20 && !hasZero(t)){
    const s = n => slotBtn(t, n);
    const gTeams = teams().filter(x=>x.g===t.g);
    const gchips = gTeams.map(x=>'<button class="gchip'+(x.c===t.c?' cur':'')+'" onclick="goTeam(\''+x.c+'\')">'
      + (FLAGS[x.c]?FLAGS[x.c]+' ':'')+x.c+'</button>').join('');
    const left = '<div class="page"><div class="pgrid">'
      + '<div class="tblock"><div class="we-pre">WE ARE</div>'
      + '<div class="we">'+(flag?flag+' ':'')+t.es.toUpperCase()+'</div></div>'
      + s(1)+s(2)
      + s(3)+s(4)+s(5)+s(6)
      + s(7)+s(8)+s(9)+s(10)
      + '</div><div class="pgn">pág. '+(pg||'?')+'</div></div>';
    const right = '<div class="page"><div class="pgrid">'
      + s(11)+s(12)+slotBtn(t, 13, 'wide shiny')
      + s(14)+s(15)+s(16)+s(17)
      + '<div class="gblock"><span class="gt">GRUPO '+t.g+'</span><span class="gflags">'+gchips+'</span></div>'
      + s(18)+s(19)+s(20)
      + '</div><div class="pgn">pág. '+(pg?pg+1:'?')+'</div></div>';
    el.innerHTML = '<div class="spread">'+left+right+'</div>'+metabar;
    return;
  }

  // Fallback (FWC, CC, equipos custom o con rango editado): grilla uniforme
  let slots='';
  for(const n of list) slots += slotBtn(t, n);
  el.innerHTML = '<div class="album">'
    + '<div class="topline"><div>'
    + (t.special ? '' : '<div class="we-pre">WE ARE</div>')
    + '<div class="we">'+(flag?flag+' ':'')+t.es.toUpperCase()+'</div></div>'
    + '</div>'
    + '<div class="slots">'+slots+'</div></div>'
    + metabar;
}

function renderRepes(){
  const rows = [];
  for(const t of teams()) for(const n of nums(t)){
    const code = codeOf(t.c, n), v = cnt(code);
    if(v>1) rows.push({code, tc:t.c, extra:v-1});
  }
  $('repList').innerHTML = rows.length ? rows.map(r =>
    '<div class="row"><span class="code">'+r.code+'</span>'
    + '<span class="info"><span class="t">'+team(r.tc).es+'</span></span>'
    + '<span class="cnt">×'+r.extra+'</span>'
    + '<button onclick="trade(\''+r.code+'\')">−</button></div>'
  ).join('') : '<div class="empty">Sin repetidas por ahora</div>';
}

function renderFaltan(){
  const sel = $('faltanTeam');
  const cur = sel.value || 'ALL';
  let opts = '<option value="ALL">Todos los equipos</option>';
  for(const t of teams()){
    let miss=0;
    for(const n of nums(t)) if(cnt(codeOf(t.c,n))===0) miss++;
    opts += '<option value="'+t.c+'"'+(t.c===cur?' selected':'')+'>'+t.es+' — faltan '+miss+'</option>';
  }
  sel.innerHTML = opts;
  const list = $('faltanList');
  const show = cur==='ALL' ? teams() : teams().filter(t=>t.c===cur);
  let html='';
  for(const t of show){
    const missing = nums(t).filter(n => cnt(codeOf(t.c,n))===0);
    if(!missing.length) continue;
    html += '<h2>'+t.es+' ('+missing.length+')</h2><div class="grid">'
      + missing.map(n=>'<button onclick="goCode(\''+codeOf(t.c,n)+'\',\''+t.c+'\')">'+(n===0?'00':n)+'</button>').join('')
      + '</div>';
  }
  list.innerHTML = html || '<div class="empty">🎉 ¡Nada pendiente acá!</div>';
}

function renderTeams(){
  $('teamList').innerHTML = teams().map(t=>{
    const list = nums(t);
    let done=0, reps=0;
    for(const n of list){ const v=cnt(codeOf(t.c,n)); if(v>0)done++; reps+=Math.max(0,v-1); }
    const pct = Math.round(done/list.length*100);
    return '<div class="team-row" onclick="goTeam(\''+t.c+'\')">'
      + '<span class="nm">'+(FLAGS[t.c]?FLAGS[t.c]+' ':'')+t.es+' <small>'+t.c+(t.g?' · Gr. '+t.g:'')+(t.p?' · pág. '+t.p:'')+'</small></span>'
      + '<span class="pr"><b>'+done+'</b>/'+list.length+(reps?' · <span style="color:var(--rep)">'+reps+' rep</span>':'')
      + '<span class="bar"><i style="width:'+pct+'%"></i></span></span></div>';
  }).join('');
}

function renderAll(){
  renderStats(); renderResult(); renderTeamView();
  renderRepes(); renderFaltan(); renderTeams();
}

// ── Acciones ───────────────────────────────────────────────
function toast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'), 1400);
}
function plus(){ if(selCode){ setCnt(selCode, cnt(selCode)+1); toast(selCode+' → '+(cnt(selCode)===1?'¡la tenés!':'repe ×'+(cnt(selCode)-1))); } }
function minus(){
  if(!selCode) return;
  const was = cnt(selCode);
  setCnt(selCode, was-1);
  toast(was>1 ? selCode+': repe entregada' : selCode+': marcada como faltante');
}
function trade(code){ setCnt(code, cnt(code)-1); toast(code+': repe entregada'); }
function pick(code){ selCode = code; renderResult(); renderTeamView(); }
function goCode(code, tc){
  selCode = code; selTeam = tc;
  switchTab('buscar'); $('q').value = code; hideSugs(); renderAll();
}
function goTeam(c){
  selTeam = c; selCode = null;
  switchTab('buscar'); $('q').value = c; hideSugs(); renderAll();
}
function editPage(c){
  const p = prompt('¿En qué página del álbum está '+team(c).es+'?', pageOf(c));
  if(p && !isNaN(+p)){ db.pages[c] = +p; save(); renderAll(); }
}
function editMax(c){
  const t = team(c);
  const p = prompt('¿Hasta qué número llega '+t.es+' ('+c+')? (hoy: '+maxOf(t)+')', maxOf(t));
  if(p && !isNaN(+p) && +p>=1 && +p<=300){ db.sizes[c] = +p; save(); renderAll(); }
}

// ── Búsqueda con sugerencias ───────────────────────────────
function matchTeams(raw){
  const r = norm(raw);
  const score = t => {
    if(t.c.startsWith(r)) return 0;
    if((t.a||[]).some(a => a.startsWith(r))) return 1;
    if(norm(t.es).startsWith(r) || norm(t.en).startsWith(r)) return 2;
    if(norm(t.es).includes(r) || norm(t.en).includes(r)) return 3;
    return 9;
  };
  return teams().map(t => [score(t), t]).filter(x => x[0] < 9)
    .sort((a,b) => a[0]-b[0]).map(x => x[1]).slice(0, 8);
}
function hideSugs(){ $('sugs').style.display='none'; $('sugs').innerHTML=''; }
function showSugs(list){
  const el = $('sugs');
  if(!list.length){ hideSugs(); return; }
  el.innerHTML = list.map(t =>
    '<button class="sug" onclick="goTeam(\''+t.c+'\')">'
    + '<span class="sc">'+t.c+'</span>'
    + '<span class="sn">'+(FLAGS[t.c]?FLAGS[t.c]+' ':'')+t.es+(t.en!==t.es?'<small>'+t.en+'</small>':'')+'</span>'
    + '</button>'
  ).join('');
  el.style.display='';
}
function resolveCode(letters, numStr){
  const r = norm(letters);
  const t = teams().find(t => t.c===r || (t.a||[]).includes(r));
  if(!t) return null;
  const n = parseInt(numStr, 10);
  if(numStr==='00' || n===0) return hasZero(t) ? {t, n:0} : null;
  if(n>=1 && n<=maxOf(t)) return {t, n};
  return null;
}
$('q').addEventListener('input', e=>{
  const raw = e.target.value.replace(/[\s\-\.]/g,'');
  const m = norm(raw).match(/^([A-Z]{2,4})(\d{1,3})$/);
  if(m){
    const hit = resolveCode(m[1], m[2]);
    if(hit){ selTeam = hit.t.c; selCode = codeOf(hit.t.c, hit.n); hideSugs(); }
    else { selTeam = null; selCode = null; hideSugs(); }
  } else if(raw.length>=1 && /^[^\d]+$/.test(raw)){
    selCode = null;
    const r = norm(raw);
    const exact = teams().find(t => t.c===r || (t.a||[]).includes(r));
    const list = matchTeams(raw);
    if(exact){ selTeam = exact.c; hideSugs(); }
    else if(list.length===1){ selTeam = list[0].c; hideSugs(); }
    else { selTeam = null; showSugs(list); }
  } else { selTeam = null; selCode = null; hideSugs(); }
  renderResult(); renderTeamView();
});

// ── Tabs ───────────────────────────────────────────────────
function switchTab(name){
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on', b.dataset.t===name));
  document.querySelectorAll('section').forEach(s=>s.classList.toggle('on', s.id==='sec-'+name));
  window.scrollTo(0,0);
}
document.querySelectorAll('.tabs button').forEach(b=>{
  b.addEventListener('click', ()=>{ switchTab(b.dataset.t); renderAll(); });
});
$('faltanTeam').addEventListener('change', renderFaltan);

// ── Equipos custom ─────────────────────────────────────────
$('addTeam').addEventListener('click', ()=>{
  const code = (prompt('Código del equipo (3 letras, ej. ITA):')||'').toUpperCase().trim();
  if(!/^[A-Z]{2,4}$/.test(code)) return;
  if(teamIdx(code)>=0){ toast('Ese código ya existe'); return; }
  const name = (prompt('Nombre del equipo:')||code).trim();
  db.custom.push({c:code, es:name, en:name}); save(); renderAll(); toast(name+' agregado');
});

// ── Backup ─────────────────────────────────────────────────
$('expBtn').addEventListener('click', ()=>{
  const data = JSON.stringify(db);
  $('io').value = data;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(data).then(()=>toast('Backup copiado')).catch(()=>{ $('io').select(); toast('Copialo manualmente'); });
  } else { $('io').select(); try{ document.execCommand('copy'); toast('Backup copiado'); }catch(e){} }
});
$('dlBtn').addEventListener('click', ()=>{
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(db));
  a.download = 'album-panini-2026-backup.json';
  document.body.appendChild(a); a.click(); a.remove();
});
$('impBtn').addEventListener('click', ()=>{
  try{
    const obj = JSON.parse($('io').value);
    if(!obj || typeof obj.counts !== 'object') throw 0;
    if(!confirm('Esto reemplaza tus datos actuales. ¿Importar?')) return;
    db = {counts:obj.counts||{}, custom:obj.custom||[], pages:obj.pages||{}, sizes:obj.sizes||{}};
    save(); renderAll(); toast('Backup importado');
  }catch(e){ toast('El texto pegado no es un backup válido'); }
});

$('storageNote').textContent = storageOk
  ? 'Los datos se guardan solos en este navegador. El backup es por si cambiás de teléfono o navegador.'
  : '⚠️ Este navegador no permite guardar datos: al cerrar la página se pierde todo. Usá "Copiar backup" antes de salir.';

renderAll();
</script>
