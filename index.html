<meta charset="utf-8">
<title>Álbum Panini 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<style>
  :root{
    --bg:#f4f6f4; --card:#ffffff; --text:#15211a; --muted:#5c6b62;
    --border:#d8ded9; --accent:#1f7a3d; --accent-soft:#e3f0e7;
    --ok:#1f7a3d; --ok-bg:#e3f0e7; --miss:#b3261e; --miss-bg:#fbe9e7;
    --rep:#0b5cad; --rep-bg:#e2eefb; --chip:#eceeec;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#121714; --card:#1c231e; --text:#e8ede9; --muted:#9aa79f;
      --border:#2e372f; --accent:#4cba74; --accent-soft:#1e3327;
      --ok:#4cba74; --ok-bg:#1e3327; --miss:#ff7b6e; --miss-bg:#3a221f;
      --rep:#6db3f2; --rep-bg:#1c2c3d; --chip:#252d27;
    }
  }
  :root[data-theme="light"]{
    --bg:#f4f6f4; --card:#ffffff; --text:#15211a; --muted:#5c6b62;
    --border:#d8ded9; --accent:#1f7a3d; --accent-soft:#e3f0e7;
    --ok:#1f7a3d; --ok-bg:#e3f0e7; --miss:#b3261e; --miss-bg:#fbe9e7;
    --rep:#0b5cad; --rep-bg:#e2eefb; --chip:#eceeec;
  }
  :root[data-theme="dark"]{
    --bg:#121714; --card:#1c231e; --text:#e8ede9; --muted:#9aa79f;
    --border:#2e372f; --accent:#4cba74; --accent-soft:#1e3327;
    --ok:#4cba74; --ok-bg:#1e3327; --miss:#ff7b6e; --miss-bg:#3a221f;
    --rep:#6db3f2; --rep-bg:#1c2c3d; --chip:#252d27;
  }
  :root[data-theme="light"]{
    --bg:#f4f6f4; --card:#ffffff; --text:#15211a; --muted:#5c6b62;
    --border:#d8ded9; --accent:#1f7a3d; --accent-soft:#e3f0e7;
    --ok:#1f7a3d; --ok-bg:#e3f0e7; --miss:#b3261e; --miss-bg:#fbe9e7;
    --rep:#0b5cad; --rep-bg:#e2eefb; --chip:#eceeec;
  }
  :root[data-theme="dark"]{
    --bg:#121714; --card:#1c231e; --text:#e8ede9; --muted:#9aa79f;
    --border:#2e372f; --accent:#4cba74; --accent-soft:#1e3327;
    --ok:#4cba74; --ok-bg:#1e3327; --miss:#ff7b6e; --miss-bg:#3a221f;
    --rep:#6db3f2; --rep-bg:#1c2c3d; --chip:#252d27;
  }
  *{box-sizing:border-box; min-width:0}
  html,body{margin:0; overflow-x:hidden; max-width:100%}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:16px; line-height:1.4;
    -webkit-tap-highlight-color:transparent;
  }
  .wrap{max-width:520px; margin:0 auto; padding:12px 12px 84px}
  header{padding:4px 2px 10px}
  .hrow{display:flex; align-items:center; justify-content:space-between; gap:8px}
  header h1{font-size:1rem; margin:0; letter-spacing:.02em; white-space:nowrap}
  header h1 span{color:var(--accent)}
  .hbtns{display:flex; gap:6px}
  .hbtns button{
    border:1.5px solid var(--border); background:var(--card); color:var(--accent);
    border-radius:9px; padding:5px 12px; font-size:1.05rem; font-weight:800; cursor:pointer; line-height:1.2;
  }
  .stats{font-size:.75rem; color:var(--muted); font-variant-numeric:tabular-nums; margin-top:4px; white-space:nowrap}
  .stats b{color:var(--text)}

  .tabs{
    position:fixed; bottom:0; left:0; right:0; z-index:10;
    display:flex; background:var(--card); border-top:1px solid var(--border);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .tabs button{
    flex:1; padding:12px 2px 10px; border:0; background:none; color:var(--muted);
    font-size:.78rem; font-weight:600; letter-spacing:.03em; cursor:pointer;
  }
  .tabs button .n{display:block; font-size:1.15rem; line-height:1.1; font-variant-numeric:tabular-nums}
  .tabs button.on{color:var(--accent)}

  section{display:none}
  section.on{display:block}

  input[type=text], select, textarea{
    width:100%; padding:12px 14px; font-size:1.05rem; color:var(--text);
    background:var(--card); border:1.5px solid var(--border); border-radius:10px;
    outline:none;
  }
  input[type=text]:focus{border-color:var(--accent)}
  #q{font-size:1.35rem; text-transform:uppercase; font-weight:700; letter-spacing:.06em; text-align:center}

  .sugs{margin-top:8px; background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden}
  .sug{
    display:flex; align-items:center; gap:10px; width:100%; text-align:left;
    padding:13px 14px; border:0; border-bottom:1px solid var(--border);
    background:none; color:var(--text); font-size:1rem; cursor:pointer;
  }
  .sug:last-child{border-bottom:0}
  .sug .sc{font-weight:800; letter-spacing:.05em; min-width:52px; color:var(--accent)}
  .sug .sn{flex:1}
  .sug .sn small{color:var(--muted); display:block; font-size:.75rem}
  .fl{width:22px; height:auto; border-radius:2px; vertical-align:-4px}
  .fl.big{width:44px; border-radius:3px; box-shadow:0 1px 5px rgba(0,0,0,.45); margin-top:7px}

  .card{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; margin-top:12px}

  /* Inicio: resumen + lista de selecciones */
  .statgrid{display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:10px}
  .stat{border-radius:11px; padding:8px 2px; text-align:center}
  .stat .v{font-size:1.2rem; font-weight:900; font-variant-numeric:tabular-nums; line-height:1.1}
  .stat .l{font-size:.54rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; opacity:.9}
  .stat.ok{background:var(--ok-bg); color:var(--ok)}
  .stat.miss{background:var(--miss-bg); color:var(--miss)}
  .stat.rep{background:var(--rep-bg); color:var(--rep)}
  .stat.pct{background:var(--accent-soft); color:var(--accent)}
  #home h2{margin:10px 2px 4px}
  .teambtns{display:grid; grid-template-columns:repeat(6,1fr); gap:4px; margin-top:6px}
  .tbtn{
    display:flex; flex-direction:column; align-items:center; gap:2px; padding:4px 1px;
    border-radius:7px; border:1px solid var(--border); background:var(--card); color:var(--text);
    font-weight:800; font-size:.6rem; letter-spacing:.03em; cursor:pointer; font-family:inherit;
  }
  .tbtn .fl{width:19px; vertical-align:0}

  /* Barra de acción (figurita seleccionada + botones) */
  .actionbar{display:flex; gap:8px; margin-top:10px}
  .ab-chip{
    flex:1; border-radius:10px; display:flex; align-items:center; justify-content:center; gap:8px;
    font-weight:800; font-size:.95rem; padding:11px 6px; font-variant-numeric:tabular-nums;
  }
  .ab-chip.miss{background:var(--miss-bg); color:var(--miss)}
  .ab-chip.ok{background:var(--ok-bg); color:var(--ok)}
  .ab-chip.rep{background:var(--rep-bg); color:var(--rep)}
  .ab-chip.none{background:var(--chip); color:var(--muted); font-weight:600; font-size:.85rem}
  .ab-chip{flex-wrap:wrap}
  .ab-chip .pname{width:100%; text-align:center; font-size:.72rem; font-weight:600; opacity:.85; line-height:1.1}
  .ab-btn{
    padding:11px 16px; border-radius:10px; font-weight:800; font-size:1rem; cursor:pointer;
    border:1.5px solid var(--border); background:var(--card); color:var(--text);
  }
  .ab-btn.primary{background:var(--accent); border-color:var(--accent); color:#fff}
  .ab-btn:disabled{opacity:.35}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(56px,1fr)); gap:8px; margin-top:10px}
  .grid button{
    padding:10px 2px; border-radius:9px; border:1.5px solid var(--border);
    background:var(--chip); color:var(--muted); font-weight:700; font-size:.95rem;
    font-variant-numeric:tabular-nums; cursor:pointer; position:relative;
  }
  .grid button.sel{outline:3px solid var(--accent)}

  /* Páginas estilo álbum (color según equipo via --tc) */
  .spread{display:flex; flex-direction:column; gap:10px; margin-top:10px}
  .spread.horiz{flex-direction:row; gap:6px}
  .page{
    border-radius:12px; padding:10px; color:#fff; position:relative;
    background:linear-gradient(160deg,#1fae5e,#0d7247);
    background:linear-gradient(160deg,
      color-mix(in srgb, var(--tc,#17934e) 78%, white) 0%,
      var(--tc,#17934e) 42%,
      color-mix(in srgb, var(--tc,#0b5e50) 78%, black) 100%);
  }
  .page.pgleft{padding-left:10px}
  .spread.horiz .page{flex:1; padding:5px}
  .spread.horiz .page.pgleft{padding-left:5px}
  .pgrid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; grid-auto-rows:minmax(74px,auto)}
  .spread.horiz .pgrid{gap:4px; grid-auto-rows:minmax(58px,auto)}
  .tblock{
    grid-column:span 2; display:flex; flex-direction:column; justify-content:center; align-items:flex-start;
    text-align:left; padding:4px 2px 4px 5px; min-width:0; overflow:hidden;
  }
  .we-pre{font-size:1.05rem; font-weight:900; font-style:italic; letter-spacing:.14em; line-height:1; color:rgba(255,255,255,.95); text-shadow:1px 1px 0 rgba(0,0,0,.18)}
  .we{
    font-size:clamp(1rem, 5.4vw, 1.35rem); font-weight:900; font-style:italic; letter-spacing:0; line-height:.98;
    text-transform:uppercase; text-wrap:balance; max-width:100%; overflow-wrap:anywhere;
    color:#10304a; color:color-mix(in srgb, var(--tc,#0d7247) 38%, black);
  }
  .fed{display:flex; gap:6px; align-items:flex-start; margin-top:6px; max-width:100%; min-width:0}
  .fed .fl{width:26px; box-shadow:0 1px 3px rgba(0,0,0,.35)}
  .fed span{
    flex:1; min-width:0; font-size:.5rem; font-weight:800; line-height:1.08; text-align:left; max-width:110px;
    overflow-wrap:anywhere;
    color:#10304a; color:color-mix(in srgb, var(--tc,#0d7247) 38%, black);
  }
  .spread.horiz .tblock{padding:3px 1px 3px 4px; justify-content:center}
  .spread.horiz .we{font-size:clamp(.64rem, 3.2vw, .82rem); line-height:.96}
  .spread.horiz .we-pre{font-size:.56rem; letter-spacing:.08em}
  .spread.horiz .fed{margin-top:3px; gap:4px}
  .spread.horiz .fed .fl{width:16px}
  .spread.horiz .fed span{display:none}
  .pgn{text-align:right; font-size:.68rem; opacity:.75; margin-top:6px; font-style:italic}
  .spread.horiz .pgn{font-size:.58rem}

  .slot{position:relative; border:0; border-radius:9px; padding:12px 2px 10px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; cursor:pointer; font-family:inherit}
  .spread.horiz .slot{padding:7px 1px 6px; gap:1px; border-radius:6px}
  .slot .sc{position:absolute; top:7px; left:0; right:0; text-align:center; font-size:.6rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase}
  .slot .sn{font-size:1.55rem; font-weight:900; font-style:italic; line-height:1; font-variant-numeric:tabular-nums}
  .slot .pn{
    font-size:.5rem; font-weight:800; text-transform:uppercase; letter-spacing:.03em;
    line-height:1.1; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    opacity:.85; padding:0 2px; margin-top:1px;
  }
  .spread.horiz .slot .pn{display:none}
  .spread.horiz .slot .sc{top:5px; font-size:.48rem}
  .spread.horiz .slot .sn{font-size:1.15rem}
  .slot.smiss{background:#ffffff; color:#a9b6c4; box-shadow:inset 0 0 0 2px rgba(30,60,90,.08)}
  .slot.sok{background:linear-gradient(160deg,#0e4d2c,#186b3c); color:#fff; box-shadow:inset 0 0 0 2px rgba(255,255,255,.28)}
  .slot.srep{background:linear-gradient(160deg,#3b2a6e,#6242a8); color:#fff}
  .slot.sel{outline:3px solid #ffd757}
  .slot.shiny.smiss{background:linear-gradient(160deg,#ead9f7,#cbaae9); color:#7a4ba8}
  .slot .b{position:absolute; top:-7px; right:-6px; background:#ffd757; color:#4a3a10; border-radius:9px; font-size:.68rem; padding:1px 5px; font-weight:800}
  .slot .tick{position:absolute; top:4px; right:6px; font-size:.7rem; opacity:.9}
  .slot.wide{
    grid-column:span 2;
    justify-self:center;
    align-self:center;
    width:64%;
    aspect-ratio:1.48;
    min-height:0;
  }
  .spread.horiz .slot.wide{width:63%}
  .gblock{
    display:flex; align-items:center; justify-content:center; padding:0 2px;
    background:transparent; color:rgba(255,255,255,.95);
  }
  .gblock .gt{
    display:inline-block; padding:3px 0; border-top:2px solid rgba(255,255,255,.7);
    border-bottom:2px solid rgba(255,255,255,.7);
    font-weight:900; font-style:italic; font-size:.72rem; letter-spacing:.06em; white-space:nowrap;
    text-shadow:1px 1px 0 rgba(0,0,0,.18);
  }
  .spread.horiz .gblock .gt{font-size:.52rem; border-width:1.5px}
  .metabar{display:flex; justify-content:flex-end; gap:14px; margin-top:8px; font-size:.78rem; color:var(--muted); font-variant-numeric:tabular-nums; flex-wrap:wrap}
  .metabar span{cursor:pointer}
  .metabar .lay{color:var(--accent); font-weight:700}
  .teamnav{display:flex; align-items:center; gap:8px; margin-top:10px}
  .teamnav button{
    width:44px; height:40px; border-radius:10px; border:1.5px solid var(--border);
    background:var(--card); color:var(--accent); font-size:1.35rem; font-weight:900; cursor:pointer;
  }
  .teamnav .teamlabel{
    flex:1; display:flex; align-items:center; justify-content:center; gap:7px; min-height:40px;
    border:1px solid var(--border); border-radius:10px; background:var(--card);
    font-size:.82rem; font-weight:800; color:var(--text); text-align:center;
  }
  .teamnav .teamlabel small{font-size:.68rem; font-weight:700; color:var(--muted)}

  /* Fallback grilla uniforme (FWC / CC / custom) */
  .album{
    border-radius:14px; padding:14px 12px; margin-top:12px; color:#fff;
    background:linear-gradient(160deg,#1fae5e,#0d7247);
    background:linear-gradient(160deg,
      color-mix(in srgb, var(--tc,#17934e) 78%, white) 0%,
      var(--tc,#17934e) 42%,
      color-mix(in srgb, var(--tc,#0b5e50) 78%, black) 100%);
  }
  .album .we{font-size:1.45rem}
  .slots{display:grid; grid-template-columns:repeat(4,1fr); gap:9px; margin-top:14px}
  .slots .slot{min-height:76px; padding-top:18px}
  .slots .slot .sc{top:9px}
  .slots .slot .sn{margin-top:6px}

  .row{
    display:flex; align-items:center; gap:10px; padding:10px 4px;
    border-bottom:1px solid var(--border);
  }
  .row:last-child{border-bottom:0}
  .row .code{font-weight:800; font-variant-numeric:tabular-nums; min-width:74px; letter-spacing:.04em}
  .row .info{flex:1; min-width:0}
  .row .info .t{font-size:.9rem}
  .row .cnt{font-weight:800; color:var(--rep); font-variant-numeric:tabular-nums}
  .row button{
    width:46px; height:46px; border-radius:10px; border:1.5px solid var(--rep);
    background:var(--rep-bg); color:var(--rep); font-size:1.4rem; font-weight:800; cursor:pointer;
  }

  .team-row{display:flex; align-items:center; gap:10px; padding:11px 4px; border-bottom:1px solid var(--border); cursor:pointer}
  .team-row:last-child{border-bottom:0}
  .team-row .nm{flex:1; font-weight:600}
  .team-row .nm small{color:var(--muted); font-weight:400}
  .team-row .pr{font-size:.85rem; color:var(--muted); font-variant-numeric:tabular-nums; text-align:right}
  .team-row .pr b{color:var(--text)}
  .bar{height:5px; background:var(--chip); border-radius:3px; overflow:hidden; margin-top:4px; width:90px}
  .bar i{display:block; height:100%; background:var(--accent)}

  h2{font-size:.8rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:18px 2px 6px}
  .hint{font-size:.8rem; color:var(--muted); margin-top:8px; text-align:center}
  .btn-line{display:flex; gap:8px; margin-top:10px}
  .btn-line button{
    flex:1; padding:11px 6px; border-radius:10px; border:1.5px solid var(--border);
    background:var(--card); color:var(--text); font-weight:600; font-size:.9rem; cursor:pointer;
  }
  #resetBtn.armed{background:var(--miss); border-color:var(--miss); color:#fff}
  .empty{text-align:center; color:var(--muted); padding:26px 10px; font-size:.95rem}
  .toast{
    position:fixed; bottom:84px; left:50%; transform:translateX(-50%);
    background:var(--text); color:var(--bg); padding:9px 18px; border-radius:20px;
    font-size:.9rem; font-weight:600; opacity:0; transition:opacity .25s; pointer-events:none; z-index:20;
  }
  .toast.show{opacity:1}
  button:focus-visible, input:focus-visible, select:focus-visible{outline:3px solid var(--accent); outline-offset:1px}
  @media (prefers-reduced-motion: reduce){ .toast{transition:none} }

  /* Reporte imprimible */
  #report{display:none}
  @media print{
    @page{size:A4; margin:7mm}
    body > *:not(#report){display:none !important}
    #report{display:block !important; color:#000; background:#fff; font-size:7.2px; line-height:1.18}
    #report h1{font-size:13px; margin:0 0 2px}
    #report .rsum{font-size:9px; font-weight:700; margin-bottom:5px}
    #report .rgrid{column-count:3; column-gap:9px}
    #report .rteam{break-inside:avoid; page-break-inside:avoid; margin-bottom:3px}
    #report .rteam b{font-size:7.6px}
    #report .rline{margin-left:0}
  }
</style>

<div class="wrap">
  <header>
    <div class="hrow">
      <h1>⚽ <span>Mundial 2026</span></h1>
      <div class="hbtns">
        <button id="cfgBtn" title="Configuración">⚙</button>
      </div>
    </div>
    <div class="stats" id="stats"></div>
  </header>

  <!-- BUSCAR -->
  <section id="sec-buscar" class="on">
    <input type="text" id="q" placeholder="ARG10 · FWC5 · bosnia…" autocomplete="off" autocapitalize="characters" inputmode="text">
    <div class="sugs" id="sugs" style="display:none"></div>
    <div id="teamview"></div>
    <div class="actionbar" id="result"></div>
    <div id="home"></div>
  </section>

  <!-- REPES -->
  <section id="sec-repes">
    <div class="card" style="padding:6px 10px" id="repList"></div>
    <p class="hint">Tocá <b>−</b> cuando entregás una repetida en un cambio.</p>
  </section>

  <!-- FALTAN -->
  <section id="sec-faltan">
    <select id="faltanTeam"></select>
    <div id="faltanList"></div>
  </section>

  <!-- EQUIPOS -->
  <section id="sec-equipos">
    <div class="card" style="padding:6px 10px" id="teamList"></div>
  </section>

  <!-- CONFIG -->
  <section id="sec-config">
    <h2>Apariencia</h2>
    <div class="card">
      <select id="themeSel">
        <option value="">Tema: automático (según el sistema)</option>
        <option value="light">Tema: claro</option>
        <option value="dark">Tema: oscuro</option>
      </select>
      <div class="btn-line">
        <button id="layBtn">Cambiar vista</button>
      </div>
    </div>
    <h2>Datos</h2>
    <div class="card">
      <textarea id="io" rows="3" placeholder="Acá aparece tu backup, o pegá uno para importar" style="font-size:.8rem; font-family:monospace"></textarea>
      <div class="btn-line">
        <button id="syncBtn">🔗 Compartir backup</button>
      </div>
      <div class="btn-line">
        <button id="expBtn">Copiar backup</button>
        <button id="dlBtn">Descargar</button>
        <button id="impBtn">Importar</button>
      </div>
      <p class="hint" id="storageNote"></p>
    </div>
    <h2>Álbum</h2>
    <div class="card">
      <div class="btn-line">
        <button onclick="printReport()">🖨 Reporte</button>
      </div>
    </div>
    <h2>Zona peligrosa</h2>
    <div class="card">
      <div class="btn-line">
        <button id="resetBtn" style="border-color:var(--miss); color:var(--miss)">🗑 Resetear álbum</button>
      </div>
      <p class="hint">Borra todas las figuritas cargadas (pegadas y repes). Pide doble confirmación.</p>
    </div>
  </section>
</div>

<nav class="tabs">
  <button id="bottomHomeBtn"><span class="n">⌂</span>Inicio</button>
  <button data-t="buscar" class="on"><span class="n">🔍</span>Buscar</button>
  <button data-t="repes"><span class="n" id="tabRepes">0</span>Repetidas</button>
  <button data-t="faltan"><span class="n" id="tabFaltan">0</span>Faltan</button>
  <button data-t="equipos"><span class="n">🏳️</span>Equipos</button>
</nav>
<div class="toast" id="toast"></div>
<div id="report"></div>

<script>
'use strict';
// ── Datos base ─────────────────────────────────────────────
// Checklist real del álbum (foto del índice): 48 equipos en grupos A–L,
// p = página donde arranca cada equipo en el álbum.

  {c:'MEX',es:'México',en:'Mexico',g:'A',p:8},

// ── Estado ─────────────────────────────────────────────────
let db = {counts:{}, custom:[], pages:{}, sizes:{}, horiz:true};
let storageOk = true;
try{
  const raw = localStorage.getItem(LS_KEY);
  if(raw) db = Object.assign(db, JSON.parse(raw));
  if(!db.sizes) db.sizes = {};
  if(!db.horizSet) db.horiz = true;   // horizontal por defecto salvo elección explícita
  localStorage.setItem('__t','1'); localStorage.removeItem('__t');
}catch(e){ storageOk = false; }

function save(){
  if(!storageOk) return;
  try{ localStorage.setItem(LS_KEY, JSON.stringify(db)); }catch(e){}
}
function teams(){
  const custom = (db.custom||[]).map(x => Array.isArray(x) ? {c:x[0],es:x[1],en:x[1]} : x);
  return NATIONS.concat(custom).concat(SPECIALS);
}
function team(code){ return teams().find(t=>t.c===code) || null; }
function teamIdx(code){ return teams().findIndex(t=>t.c===code); }
function maxOf(t){ return db.sizes[t.c] || t.max || DEF_MAX; }
function hasZero(t){ return t.z === true; }
function nums(t){
  const out = hasZero(t) ? [0] : [];
  for(let n=1; n<=maxOf(t); n++) out.push(n);
  return out;
}
function codeOf(c, n){ return c + (n===0 ? '00' : n); }
function pageOf(code){
  if(db.pages && db.pages[code]) return db.pages[code];
  const t = team(code); return (t && t.p) ? t.p : null;
}
function cnt(code){ return db.counts[code] || 0; }
function setCnt(code, v){
  v = Math.max(0, v);
  if(v) db.counts[code] = v; else delete db.counts[code];
  save(); renderAll();
}
function allCodes(){
  const out = [];
  for(const t of teams()) for(const n of nums(t)) out.push(codeOf(t.c, n));
  return out;
}
function norm(s){ return s.toUpperCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }

// ── Estado UI ──────────────────────────────────────────────
let selCode = null, selTeam = null;

// ── Render ─────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function totals(){
  let have=0, reps=0, total=0;
  for(const t of teams()) total += nums(t).length;
  for(const c of allCodes()){
    const v = cnt(c);
    if(v>0){ have++; reps += v-1; }
  }
  return {have, reps, miss: total-have, total};
}

function renderStats(){
  const t = totals();
  $('stats').innerHTML = '';
  $('tabRepes').textContent = t.reps;
  $('tabFaltan').textContent = t.miss;
  $('layBtn').textContent = db.horiz ? 'Vista: doble página horizontal' : 'Vista: páginas apiladas';
}

// Barra fija: figurita seleccionada + botones
function renderResult(){
  const el = $('result');
  const idle = !selTeam && !selCode;
  el.style.display = idle ? 'none' : 'flex';
  if(idle){ el.innerHTML=''; return; }
  if(!selCode){
    el.innerHTML = '<div class="ab-chip none">Tocá un casillero o buscá un código</div>'
      + '<button class="ab-btn primary" disabled>＋1</button>'
      + '<button class="ab-btn" disabled>−1</button>';
  } else {
    const v = cnt(selCode);
    const cls = v===0 ? 'miss' : (v===1 ? 'ok' : 'rep');
    const verdict = v===0 ? '❌ FALTA' : (v===1 ? '✅ TENGO' : '🔁 REPE ×'+(v-1));
    const num = selTeam ? parseInt(selCode.slice(selTeam.length), 10) : NaN;
    const pn = selTeam ? nameOf(selTeam, num) : '';
    el.innerHTML = '<div class="ab-chip '+cls+'"><b>'+selCode+'</b><span>'+verdict+'</span>'
      + (pn ? '<span class="pname">'+pn+'</span>' : '') + '</div>'
      + '<button class="ab-btn primary" onclick="plus()">＋1</button>'
      + '<button class="ab-btn" onclick="minus()"'+(v===0?' disabled':'')+'>−1</button>';
  }
}

// Pantalla de inicio: resumen + selecciones en orden alfabético
function renderHome(){
  const el = $('home');
  const idle = !selTeam && !selCode && !$('q').value.trim();
  if(!idle){ el.innerHTML=''; return; }
  const t = totals();
  const pct = Math.round(t.have/t.total*100);
  const nations = NATIONS.slice().sort((a,b)=>a.c.localeCompare(b.c));
  const all = nations.concat(SPECIALS)
    .concat((db.custom||[]).map(x => Array.isArray(x) ? {c:x[0],es:x[1],en:x[1]} : x));
  const btns = all.map(x=>{
    const full = team(x.c) || x;
    return '<button class="tbtn" onclick="goTeam(\''+full.c+'\')">'
      + (ISO[full.c] ? flagHtml(full.c) : '🏆')
      + '<span>'+full.c+'</span></button>';
  }).join('');
  el.innerHTML = '<div class="statgrid">'
    + '<div class="stat ok"><div class="v">'+t.have+'</div><div class="l">Pegadas</div></div>'
    + '<div class="stat miss"><div class="v">'+t.miss+'</div><div class="l">Faltan</div></div>'
    + '<div class="stat rep"><div class="v">'+t.reps+'</div><div class="l">Repes</div></div>'
    + '<div class="stat pct"><div class="v">'+pct+'%</div><div class="l">%</div></div>'
    + '</div>'
    + '<h2>Selecciones</h2><div class="teambtns">'+btns+'</div>'
    + '<div class="btn-line"><button onclick="printReport()">🖨 Reporte para imprimir</button></div>';
}

function slotBtn(t, n, extra){
  const code = codeOf(t.c, n), v = cnt(code);
  const cls = 'slot '+(v>1?'srep':(v===1?'sok':'smiss'))+(code===selCode?' sel':'')+(extra?' '+extra:'');
  const pn = nameOf(t.c, n);
  return '<button class="'+cls+'" onclick="pick(\''+code+'\')">'
    + '<span class="sc">'+t.c+'</span><span class="sn">'+(n===0?'00':n)+'</span>'
    + (pn ? '<span class="pn">'+pn+'</span>' : '')
    + (v>1 ? '<span class="b">+'+(v-1)+'</span>' : (v===1 ? '<span class="tick">✓</span>' : ''))
    + '</button>';
}
function renderTeamView(){
  const el = $('teamview');
  const t = selTeam ? team(selTeam) : null;
  if(!t){ el.innerHTML=''; return; }
  const pg = pageOf(t.c), list = nums(t);
  const tc = COLORS[t.c] || '';
  const style = tc ? ' style="--tc:'+tc+'"' : '';

  // Distribución real del álbum (doble página) para selecciones con 1–20
  if(t.g && maxOf(t)===20 && !hasZero(t)){
    const s = n => slotBtn(t, n);
    const left = '<div class="page pgleft"'+style+'>'
      + '<div class="pgrid">'
      + '<div class="tblock"><div class="we-pre">WE ARE</div>'
      + '<div class="we">'+t.en.toUpperCase()+'</div>'
      + '<div class="fed">'+flagHtml(t.c)+(FED[t.c]?'<span>'+FED[t.c]+'</span>':'')+'</div></div>'
      + s(1)+s(2)
      + s(3)+s(4)+s(5)+s(6)
      + s(7)+s(8)+s(9)+s(10)
      + '</div><div class="pgn">pág. '+(pg||'?')+'</div></div>';
    const right = '<div class="page"'+style+'><div class="pgrid">'
      + s(11)+s(12)+slotBtn(t, 13, 'wide')
      + s(14)+s(15)+s(16)+s(17)
      + '<div class="gblock"><span class="gt">GRUPO '+t.g+'</span></div>'
      + s(18)+s(19)+s(20)
      + '</div><div class="pgn">pág. '+(pg?pg+1:'?')+'</div></div>';
    el.innerHTML = teamNavHtml(t) + '<div class="swipearea"><div class="spread'+(db.horiz?' horiz':'')+'">'+left+right+'</div></div>';
    bindTeamSwipe();
    return;
  }

  // Fallback (FWC, CC, equipos custom o con rango editado): grilla uniforme
  let slots='';
  for(const n of list) slots += slotBtn(t, n);
  el.innerHTML = teamNavHtml(t) + '<div class="swipearea"><div class="album"'+style+'>'
    + '<div class="tblock">'
    + (t.special ? '' : '<div class="we-pre">WE ARE</div>')
    + '<div class="we">'+t.en.toUpperCase()+'</div>'
    + '<div class="fed">'+flagHtml(t.c)+(FED[t.c]?'<span>'+FED[t.c]+'</span>':'')+'</div></div>'
    + '<div class="slots">'+slots+'</div></div></div>';
  bindTeamSwipe();
}

function teamNavHtml(t){
  const pg = pageOf(t.c);
  return '<div class="teamnav">'
    + '<button type="button" onclick="moveTeam(-1)" title="Página anterior">‹</button>'
    + '<div class="teamlabel">'+flagHtml(t.c)+' <span>'+t.es+'</span>'
    + (pg ? '<small>pág. '+pg+(t.g?'–'+(pg+1):'')+'</small>' : '')
    + '</div>'
    + '<button type="button" onclick="moveTeam(1)" title="Página siguiente">›</button>'
    + '</div>';
}

function renderRepes(){
  const rows = [];
  for(const t of teams()) for(const n of nums(t)){
    const code = codeOf(t.c, n), v = cnt(code);
    if(v>1) rows.push({code, tc:t.c, extra:v-1});
  }
  $('repList').innerHTML = rows.length ? rows.map(r =>
    '<div class="row"><span class="code">'+r.code+'</span>'
    + '<span class="info"><span class="t">'+flagHtml(r.tc)+' '+team(r.tc).es+'</span></span>'
    + '<span class="cnt">×'+r.extra+'</span>'
    + '<button onclick="trade(\''+r.code+'\')">−</button></div>'
  ).join('') : '<div class="empty">Sin repetidas por ahora</div>';
}

function renderFaltan(){
  const sel = $('faltanTeam');
  const cur = sel.value || 'ALL';
  let opts = '<option value="ALL">Todos los equipos</option>';
  for(const t of teams()){
    let miss=0;
    for(const n of nums(t)) if(cnt(codeOf(t.c,n))===0) miss++;
    opts += '<option value="'+t.c+'"'+(t.c===cur?' selected':'')+'>'+t.es+' — faltan '+miss+'</option>';
  }
  sel.innerHTML = opts;
  const list = $('faltanList');
  const show = cur==='ALL' ? teams() : teams().filter(t=>t.c===cur);
  let html='';
  for(const t of show){
    const missing = nums(t).filter(n => cnt(codeOf(t.c,n))===0);
    if(!missing.length) continue;
    html += '<h2>'+t.es+' ('+missing.length+')</h2><div class="grid">'
      + missing.map(n=>'<button onclick="goCode(\''+codeOf(t.c,n)+'\',\''+t.c+'\')">'+(n===0?'00':n)+'</button>').join('')
      + '</div>';
  }
  list.innerHTML = html || '<div class="empty">🎉 ¡Nada pendiente acá!</div>';
}

function renderTeams(){
  $('teamList').innerHTML = teams().map(t=>{
    const list = nums(t);
    let done=0, reps=0;
    for(const n of list){ const v=cnt(codeOf(t.c,n)); if(v>0)done++; reps+=Math.max(0,v-1); }
    const pct = Math.round(done/list.length*100);
    return '<div class="team-row" onclick="goTeam(\''+t.c+'\')">'
      + '<span class="nm">'+flagHtml(t.c)+' '+t.es+' <small>'+t.c+(t.g?' · Gr. '+t.g:'')+(t.p?' · pág. '+t.p:'')+'</small></span>'
      + '<span class="pr"><b>'+done+'</b>/'+list.length+(reps?' · <span style="color:var(--rep)">'+reps+' rep</span>':'')
      + '<span class="bar"><i style="width:'+pct+'%"></i></span></span></div>';
  }).join('');
}

function renderAll(){
  renderStats(); renderResult(); renderTeamView(); renderHome();
  renderRepes(); renderFaltan(); renderTeams();
}

// ── Acciones ───────────────────────────────────────────────
function toast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'), 1400);
}
function plus(){ if(selCode){ setCnt(selCode, cnt(selCode)+1); toast(selCode+' → '+(cnt(selCode)===1?'¡la tenés!':'repe ×'+(cnt(selCode)-1))); } }
function minus(){
  if(!selCode) return;
  const was = cnt(selCode);
  setCnt(selCode, was-1);
  toast(was>1 ? selCode+': repe entregada' : selCode+': marcada como faltante');
}
function trade(code){ setCnt(code, cnt(code)-1); toast(code+': repe entregada'); }
function pick(code){ selCode = code; renderResult(); renderTeamView(); }
function goCode(code, tc){
  selCode = code; selTeam = tc;
  switchTab('buscar'); $('q').value = code; hideSugs(); renderAll();
}
function goTeam(c){
  selTeam = c; selCode = null;
  switchTab('buscar'); $('q').value = c; hideSugs(); renderAll();
}
function moveTeam(delta){
  if(!selTeam) return;
  const list = teams();
  const i = Math.max(0, teamIdx(selTeam));
  const next = list[(i + delta + list.length) % list.length];
  goTeam(next.c);
}
function bindTeamSwipe(){
  const area = document.querySelector('#teamview .swipearea');
  if(!area) return;
  let sx = 0, sy = 0;
  area.addEventListener('touchstart', e=>{
    const t = e.changedTouches[0]; sx = t.clientX; sy = t.clientY;
  }, {passive:true});
  area.addEventListener('touchend', e=>{
    const t = e.changedTouches[0], dx = t.clientX - sx, dy = t.clientY - sy;
    if(Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.35) moveTeam(dx < 0 ? 1 : -1);
  }, {passive:true});
}
function toggleLayout(){ db.horiz = !db.horiz; db.horizSet = true; save(); renderAll(); }
function goHome(){ selTeam = null; selCode = null; $('q').value=''; hideSugs(); renderAll(); }
function printReport(){
  const t = totals();
  let html = '<h1>Álbum Panini Mundial 2026 — mi estado</h1>'
    + '<div class="rsum">Pegadas: '+t.have+'/'+t.total+' · Faltan: '+t.miss+' · Repetidas: '+t.reps
    + ' · '+new Date().toLocaleDateString('es-AR')+'</div>';
  html += '<div class="rgrid">';
  for(const tm of teams()){
    const miss=[], reps=[];
    for(const n of nums(tm)){
      const v = cnt(codeOf(tm.c,n)), lbl = (n===0?'00':n);
      if(v===0) miss.push(lbl);
      else if(v>1) reps.push(lbl+'(×'+(v-1)+')');
    }
    html += '<div class="rteam"><b>'+tm.c+' — '+tm.es+'</b>'
      + '<div class="rline">Faltan ('+miss.length+'): '+(miss.join(', ')||'—')+'</div>'
      + '<div class="rline">Repes: '+(reps.join(', ')||'—')+'</div>'
      + '</div>';
  }
  html += '</div>';
  $('report').innerHTML = html;
  window.print();
}
function editPage(c){
  const p = prompt('¿En qué página del álbum está '+team(c).es+'?', pageOf(c));
  if(p && !isNaN(+p)){ db.pages[c] = +p; save(); renderAll(); }
}
function editMax(c){
  const t = team(c);
  const p = prompt('¿Hasta qué número llega '+t.es+' ('+c+')? (hoy: '+maxOf(t)+')', maxOf(t));
  if(p && !isNaN(+p) && +p>=1 && +p<=300){ db.sizes[c] = +p; save(); renderAll(); }
}

// ── Búsqueda con sugerencias ───────────────────────────────
function matchTeams(raw){
  const r = norm(raw);
  const score = t => {
    if(t.c.startsWith(r)) return 0;
    if((t.a||[]).some(a => a.startsWith(r))) return 1;
    if(norm(t.es).startsWith(r) || norm(t.en).startsWith(r)) return 2;
    if(norm(t.es).includes(r) || norm(t.en).includes(r)) return 3;
    return 9;
  };
  return teams().map(t => [score(t), t]).filter(x => x[0] < 9)
    .sort((a,b) => a[0]-b[0]).map(x => x[1]).slice(0, 8);
}
function hideSugs(){ $('sugs').style.display='none'; $('sugs').innerHTML=''; }
function showSugs(list){
  const el = $('sugs');
  if(!list.length){ hideSugs(); return; }
  el.innerHTML = list.map(t =>
    '<button class="sug" onclick="goTeam(\''+t.c+'\')">'
    + '<span class="sc">'+t.c+'</span>'
    + '<span class="sn">'+flagHtml(t.c)+' '+t.es+(t.en!==t.es?'<small>'+t.en+'</small>':'')+'</span>'
    + '</button>'
  ).join('');
  el.style.display='';
}
function resolveCode(letters, numStr){
  const r = norm(letters);
  const t = teams().find(t => t.c===r || (t.a||[]).includes(r));
  if(!t) return null;
  const n = parseInt(numStr, 10);
  if(numStr==='00' || n===0) return hasZero(t) ? {t, n:0} : null;
  if(n>=1 && n<=maxOf(t)) return {t, n};
  return null;
}
$('q').addEventListener('input', e=>{
  const raw = e.target.value.replace(/[\s\-\.]/g,'');
  const m = norm(raw).match(/^([A-Z]{2,4})(\d{1,3})$/);
  if(m){
    const hit = resolveCode(m[1], m[2]);
    if(hit){ selTeam = hit.t.c; selCode = codeOf(hit.t.c, hit.n); hideSugs(); }
    else { selTeam = null; selCode = null; hideSugs(); }
  } else if(raw.length>=1 && /^[^\d]+$/.test(raw)){
    // Siempre mostrar sugerencias: el equipo se elige tocándolo
    selCode = null; selTeam = null;
    showSugs(matchTeams(raw));
  } else { selTeam = null; selCode = null; hideSugs(); }
  renderResult(); renderTeamView(); renderHome();
});

// ── Tabs ───────────────────────────────────────────────────
function switchTab(name){
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on', b.dataset.t===name));
  document.querySelectorAll('section').forEach(s=>s.classList.toggle('on', s.id==='sec-'+name));
  window.scrollTo(0,0);
}
document.querySelectorAll('.tabs button[data-t]').forEach(b=>{
  b.addEventListener('click', ()=>{ switchTab(b.dataset.t); renderAll(); });
});
$('faltanTeam').addEventListener('change', renderFaltan);
$('bottomHomeBtn').addEventListener('click', ()=>{ switchTab('buscar'); goHome(); });
$('layBtn').addEventListener('click', toggleLayout);
$('cfgBtn').addEventListener('click', ()=>{ switchTab('config'); renderAll(); });

// ── Configuración ──────────────────────────────────────────
function applyTheme(){
  if(db.theme) document.documentElement.dataset.theme = db.theme;
  else delete document.documentElement.dataset.theme;
  $('themeSel').value = db.theme || '';
}
$('themeSel').addEventListener('change', e=>{
  db.theme = e.target.value || '';
  if(!db.theme) delete db.theme;
  save(); applyTheme();
});
let resetArmed = false, resetTimer = null;
$('resetBtn').addEventListener('click', ()=>{
  const btn = $('resetBtn');
  if(!resetArmed){
    resetArmed = true;
    btn.classList.add('armed');
    btn.textContent = 'Confirmar reset';
    toast('Tocá otra vez para borrar el álbum');
    clearTimeout(resetTimer);
    resetTimer = setTimeout(()=>{
      resetArmed = false;
      btn.classList.remove('armed');
      btn.textContent = '🗑 Resetear álbum';
    }, 5000);
    return;
  }
  clearTimeout(resetTimer);
  resetArmed = false;
  btn.classList.remove('armed');
  btn.textContent = '🗑 Resetear álbum';
  db.counts = {};
  save(); renderAll();
  toast('Álbum reseteado');
});

// ── Backup ─────────────────────────────────────────────────
$('expBtn').addEventListener('click', ()=>{
  const data = JSON.stringify(db);
  $('io').value = data;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(data).then(()=>toast('Backup copiado')).catch(()=>{ $('io').select(); toast('Copialo manualmente'); });
  } else { $('io').select(); try{ document.execCommand('copy'); toast('Backup copiado'); }catch(e){} }
});
$('dlBtn').addEventListener('click', ()=>{
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(db));
  a.download = 'album-panini-2026-backup.json';
  document.body.appendChild(a); a.click(); a.remove();
});
$('impBtn').addEventListener('click', ()=>{
  try{
    const obj = JSON.parse($('io').value);
    if(!obj || typeof obj.counts !== 'object') throw 0;
    if(!confirm('Esto reemplaza tus datos actuales. ¿Importar?')) return;
    db = {counts:obj.counts||{}, custom:obj.custom||[], pages:obj.pages||{}, sizes:obj.sizes||{}, horiz:!!obj.horiz};
    save(); renderAll(); toast('Backup importado');
  }catch(e){ toast('El texto pegado no es un backup válido'); }
});

// ── Backup compartible por link (#backup=...) ──────────────
function b64e(s){ return btoa(unescape(encodeURIComponent(s))); }
function b64d(s){ return decodeURIComponent(escape(atob(s))); }
$('syncBtn').addEventListener('click', ()=>{
  const url = location.href.split('#')[0] + '#backup=' + b64e(JSON.stringify(db));
  const done = ()=>toast('Backup por link copiado');
  if(navigator.share){
    navigator.share({title:'Álbum Panini 2026', text:url}).catch(()=>{
      if(navigator.clipboard) navigator.clipboard.writeText(url).then(done);
    });
  } else if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(done).catch(()=>{ $('io').value=url; toast('Copialo del cuadro de texto'); });
  } else { $('io').value = url; toast('Copialo del cuadro de texto'); }
});
(function importFromHash(){
  const isBackup = location.hash.startsWith('#backup=');
  const isOldSync = location.hash.startsWith('#sync=');
  if(!isBackup && !isOldSync) return;
  try{
    const obj = JSON.parse(b64d(location.hash.slice(isBackup ? 8 : 6)));
    if(obj && typeof obj.counts === 'object'){
      const n = Object.keys(obj.counts).length;
      if(confirm('Este link trae un backup del álbum ('+n+' figuritas cargadas). ¿Importarlo en este dispositivo? Reemplaza lo que haya acá.')){
        db = {counts:obj.counts||{}, custom:obj.custom||[], pages:obj.pages||{}, sizes:obj.sizes||{}, horiz:!!obj.horiz, horizSet:!!obj.horizSet};
        if(!db.horizSet) db.horiz = true;
        save(); toast('Backup importado desde el link');
      }
    }
  }catch(e){}
  history.replaceState(null, '', location.pathname + location.search);
})();

$('storageNote').textContent = storageOk
  ? 'Los datos se guardan solos en este navegador. El backup es por si cambiás de teléfono o navegador.'
  : '⚠️ Este navegador no permite guardar datos: al cerrar la página se pierde todo. Usá "Copiar backup" antes de salir.';

applyTheme();
renderAll();
</script>
